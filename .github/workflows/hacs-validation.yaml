name: HACS Validation

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '.github/workflows/'
  schedule:
    - cron: "0 0 * * *"

jobs:
  validate:
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "plugin"
