<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="800"
   height="400"
   viewBox="0 0 800 400"
   version="1.1"
   id="chart-plate"
   xmlns="http://www.w3.org/2000/svg">
  <rect id="plate-background" x="0" y="0" width="800" height="400" style="fill:#fafafa" />
  <text id="gauge-label" x="40" y="40" style="font-size:16px">Gauge</text>
  <rect id="my_gauge" x="40" y="60" width="240" height="180" style="fill:#dddddd" />
  <text id="chart-label" x="340" y="40" style="font-size:16px">Apex chart</text>
  <rect id="my_chart" x="340" y="60" width="420" height="300" style="fill:#dddddd" />
</svg>
